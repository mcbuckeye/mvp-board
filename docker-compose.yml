version: "3.9"

services:
  mvpb-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mvpboard
    volumes:
      - mvpb-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  mvpb-backend:
    build: ./backend
    expose:
      - "8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@mvpb-db:5432/mvpboard
      - JWT_SECRET=${JWT_SECRET:-mvpboard-dev-secret-change-in-production}
    depends_on:
      mvpb-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # HTTP router (no TLS)
      - "traefik.http.routers.mvpb-api.rule=Host(`conveneagent-api.machomelab.com`)"
      - "traefik.http.routers.mvpb-api.entrypoints=web"
      - "traefik.http.routers.mvpb-api.service=mvpb-api"
      # HTTPS router
      - "traefik.http.routers.mvpb-api-secure.rule=Host(`conveneagent-api.machomelab.com`)"
      - "traefik.http.routers.mvpb-api-secure.entrypoints=websecure"
      - "traefik.http.routers.mvpb-api-secure.tls.certResolver=letsencrypt"
      - "traefik.http.routers.mvpb-api-secure.service=mvpb-api"
      # Service
      - "traefik.http.services.mvpb-api.loadbalancer.server.port=8000"

  mvpb-frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      mvpb-backend:
        condition: service_healthy
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # HTTP router (no TLS)
      - "traefik.http.routers.mvpb-web.rule=Host(`conveneagent.machomelab.com`)"
      - "traefik.http.routers.mvpb-web.entrypoints=web"
      - "traefik.http.routers.mvpb-web.service=mvpb-web"
      # HTTPS router
      - "traefik.http.routers.mvpb-web-secure.rule=Host(`conveneagent.machomelab.com`)"
      - "traefik.http.routers.mvpb-web-secure.entrypoints=websecure"
      - "traefik.http.routers.mvpb-web-secure.tls.certResolver=letsencrypt"
      - "traefik.http.routers.mvpb-web-secure.service=mvpb-web"
      # Service
      - "traefik.http.services.mvpb-web.loadbalancer.server.port=80"

volumes:
  mvpb-pgdata:

networks:
  dokploy-network:
    external: true
