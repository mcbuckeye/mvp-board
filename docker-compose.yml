version: "3.9"

services:
  mvpb-backend:
    build: ./backend
    expose:
      - "8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - mvpb-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # HTTP router (no TLS)
      - "traefik.http.routers.mvpb-api.rule=Host(`mvp-board-api.machomelab.com`)"
      - "traefik.http.routers.mvpb-api.entrypoints=web"
      - "traefik.http.routers.mvpb-api.service=mvpb-api"
      # HTTPS router
      - "traefik.http.routers.mvpb-api-secure.rule=Host(`mvp-board-api.machomelab.com`)"
      - "traefik.http.routers.mvpb-api-secure.entrypoints=websecure"
      - "traefik.http.routers.mvpb-api-secure.tls.certResolver=letsencrypt"
      - "traefik.http.routers.mvpb-api-secure.service=mvpb-api"
      # Service
      - "traefik.http.services.mvpb-api.loadbalancer.server.port=8000"

  mvpb-frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      mvpb-backend:
        condition: service_healthy
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # HTTP router (no TLS)
      - "traefik.http.routers.mvpb-web.rule=Host(`mvp-board.machomelab.com`)"
      - "traefik.http.routers.mvpb-web.entrypoints=web"
      - "traefik.http.routers.mvpb-web.service=mvpb-web"
      # HTTPS router
      - "traefik.http.routers.mvpb-web-secure.rule=Host(`mvp-board.machomelab.com`)"
      - "traefik.http.routers.mvpb-web-secure.entrypoints=websecure"
      - "traefik.http.routers.mvpb-web-secure.tls.certResolver=letsencrypt"
      - "traefik.http.routers.mvpb-web-secure.service=mvpb-web"
      # Service
      - "traefik.http.services.mvpb-web.loadbalancer.server.port=80"

volumes:
  mvpb-data:

networks:
  dokploy-network:
    external: true
